<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HKSC Teachers | Live Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,700;1,400&family=Raleway:wght@400;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { --brand-red: #dd3214; --bg-color: #faf9f6; --card-bg: #ffffff; --text-dark: #2c2c2c; --text-light: #7a7a7a; --status-available: #27ae60; --status-busy: #f39c12; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-color); font-family: 'Raleway', sans-serif; color: var(--text-dark); padding: 20px; line-height: 1.6; }
        
        #auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .auth-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; max-width: 400px; border-top: 5px solid var(--brand-red); }
        .auth-card input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; }
        
        header { max-width: 1000px; margin: 0 auto 30px; text-align: center; }
        .logo-container { width: 80px; height: 80px; margin: 0 auto 15px; border-radius: 50%; }
        .logo-container img { width: 100%; height: 100%; object-fit: contain; }
        h1 { font-family: 'Merriweather', serif; color: var(--brand-red); font-size: 2.2rem; }
        
        .live-status-container { background: white; padding: 15px 25px; border-radius: 50px; display: flex; justify-content: center; gap: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; font-weight: 600; color: var(--brand-red); }

        /* Search Bar */
        .search-container { max-width: 600px; margin: 0 auto 30px; }
        .search-input { width: 100%; padding: 15px 25px; border-radius: 50px; border: 2px solid transparent; background: white; box-shadow: 0 5px 15px rgba(0,0,0,0.05); font-family: 'Raleway', sans-serif; font-size: 1rem; outline: none; transition: 0.3s; }
        .search-input:focus { border-color: var(--brand-red); box-shadow: 0 5px 20px rgba(221, 50, 20, 0.15); }

        .teacher-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; max-width: 1000px; margin: 0 auto; }
        .card { background: var(--card-bg); border-radius: 15px; padding: 20px; display: flex; align-items: center; gap: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .initials { width: 50px; height: 50px; background: rgba(221, 50, 20, 0.1); color: var(--brand-red); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; }
        .dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; display: inline-block; }
        .status-available { background: var(--status-available); }
        .status-busy { background: var(--brand-red); }
        .hidden { display: none !important; }
        
        /* Error Message Style */
        .no-results-msg { grid-column: 1 / -1; text-align: center; padding: 50px; font-family: 'Merriweather', serif; color: var(--text-light); font-size: 1.3rem; }
        .admin-panel { max-width: 800px; margin: 20px auto; background: #fff; padding: 20px; border-radius: 15px; border: 1px solid #eee; }
        .admin-btn { background: var(--brand-red); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-card">
            <h1>HKSC Login</h1>
            <form id="login-form">
                <input type="email" id="login-email" placeholder="Email Address" required>
                <input type="password" id="login-password" placeholder="Password" required>
                <button type="submit" class="admin-btn" style="width: 100%; margin-top: 10px;">Login</button>
            </form>
            <button style="background:none; border:none; color:grey; text-decoration:underline; cursor:pointer; margin-top:15px;" onclick="continueAsStudent()">Continue as Student</button>
        </div>
    </div>

    <header>
        <div class="logo-container"><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRdqAMJK3hktBW9V6AUFvgXRY7Xiz3877LE6w&s" alt="Logo" /></div>
        <h1>HKSC Teachers</h1>
        <div class="live-status-container">
            <span id="digital-clock">00:00:00</span> | <span id="current-date"></span> | <span id="current-period-display"></span>
        </div>
    </header>

    <div class="search-container">
        <input type="text" id="teacherSearch" class="search-input" placeholder="Search for teachers, subjects, or rooms..." oninput="renderTeachers()">
    </div>

    <div id="teacherGrid" class="teacher-grid"></div>

    <script>
        const _supabase = supabase.createClient('https://bkpymxtgfidquoouwsxy.supabase.co', 'sb_publishable_GU-jNTOOGxptv6ZMBw0dvQ_-cam5Gwk');

        function continueAsStudent() { document.getElementById('auth-overlay').classList.add('hidden'); }

        const getTimeInfo = () => {
            const now = new Date();
            document.getElementById('digital-clock').textContent = now.toLocaleTimeString('en-GB');
            document.getElementById('current-date').textContent = now.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
            
            const time = now.getHours() * 100 + now.getMinutes();
            let p = 'School is Out';
            const sched = [{n:'P1',s:930,e:1010},{n:'P2',s:1010,e:1050},{n:'Recess',s:1050,e:1110},{n:'P3',s:1110,e:1150},{n:'P4',s:1150,e:1230},{n:'Lunch',s:1230,e:1350},{n:'P5',s:1350,e:1430},{n:'P6',s:1430,e:1510},{n:'P7',s:1510,e:1550},{n:'P8',s:1550,e:1830}];
            if (now.getDay() !== 0 && now.getDay() !== 6) {
                for(const s of sched) { if(time >= s.s && time < s.e) { p = s.n; break; } }
            }
            document.getElementById('current-period-display').textContent = p;
            return { day: ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][now.getDay()], period: p };
        };

        let teachers = [
            { id: 1, name: 'Shepherd', dept: 'ICT', schedule: { Monday: { P1: 'Staff Room' } } },
            { id: 2, name: 'Jasmine', dept: 'English', schedule: { Monday: { P1: 'Room 204' } } },
            { id: 3, name: 'Jimmy', dept: 'Mathematics', schedule: { Monday: { P1: 'Staff Room' } } }
        ];

        function renderTeachers() {
            const grid = document.getElementById('teacherGrid');
            const searchInput = document.getElementById('teacherSearch');
            const query = searchInput.value.toLowerCase();
            const timeInfo = getTimeInfo();
            
            grid.innerHTML = '';
            let foundAny = false;

            teachers.forEach((t) => {
                const daySched = t.schedule[timeInfo.day] || {};
                const location = daySched[timeInfo.period] || 'Unknown';
                
                if (t.name.toLowerCase().includes(query) || t.dept.toLowerCase().includes(query) || location.toLowerCase().includes(query)) {
                    foundAny = true;
                    const initials = t.name.split(' ').map(n => n[0]).join('');
                    grid.innerHTML += `
                        <div class="card">
                            <div class="initials">${initials}</div>
                            <div class="info">
                                <div class="name">${t.name}</div>
                                <div class="dept">${t.dept}</div>
                                <div class="status-indicator">
                                    <span class="dot ${location === 'Absent' ? 'status-busy' : 'status-available'}"></span>
                                    <span>${location}</span>
                                </div>
                            </div>
                        </div>`;
                }
            });

            if (!foundAny) {
                grid.innerHTML = `<div class="no-results-msg">Sorry, but '${searchInput.value}' doesn't exist :P</div>`;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            // Clock/Status update every second
            setInterval(getTimeInfo, 1000);
            // Grid render
            renderTeachers();
        });
    </script>
</body>
</html>
